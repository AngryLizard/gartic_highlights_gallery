<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gartic Highlights Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    
    .controls label {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .controls input {
      padding: 5px;
      font-size: 16px;
      max-width: 60px;
    }
    
    .controls button {
      padding: 5px 15px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .controls button:hover {
      background-color: #0056b3;
    }
    
    .date-section {
      margin-bottom: 40px;
    }
    
    .date-section h2 {
      font-size: 20px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ddd;
    }
    
    .category-subsection {
      margin-bottom: 25px;
    }
    
    .category-subsection h3 {
      font-size: 16px;
      color: #555;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 4px solid #007bff;
    }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(var(--columns, 4), 1fr);
      gap: 15px;
    }
    
    .image-item {
      position: relative;
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .image-item img {
      display: block;
      width: 100%;
      height: 262px;
      object-fit: cover;
    }
    
    .buttons {
      position: absolute;
      bottom: 5px;
      right: 5px;
      display: flex;
      gap: 8px;
      padding: 0;
      background: transparent;
      justify-content: flex-end;
    }
    
    .icon-button {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
      border: none;
      border-radius: 4px;
      background-color: rgba(0,0,0,0.6);
      cursor: pointer;
      font-size: 11px;
      color: white;
      transition: background-color 0.2s;
    }
    
    .icon-button:hover {
      background-color: rgba(0,0,0,0.8);
    }
    
    .icon-button svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    
    .icon-button.active {
      background-color: rgba(255,215,0,0.7);
      color: #333;
    }
    
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
  </style>
</head>
<body>
  <h1>Gartic Highlights Gallery</h1>
  
  <div class="controls">
    <label for="columns">Columns:</label>
    <input type="number" id="columns" min="1" max="8" value="4">
    <button id="refresh-btn">Refresh Gallery</button>
  </div>
  <p style="text-align: center;">Mark favorites for images to be put into the highlights compilations.</p>
  <p style="text-align: center;">Mark bad images that appear to be duplicates or broken files.</p>
  <p style="text-align: center;">For duplicates, do not mark the first instance, only subsequent ones.</p>
  
  <div id="gallery">
    <br>
    <p style="text-align: center;"><b>Loading gallery...</b></p>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
