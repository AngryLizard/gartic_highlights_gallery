<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gartic Highlights Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    
    .controls label {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .controls input {
      padding: 5px;
      font-size: 16px;
    }
    
    .date-section {
      margin-bottom: 40px;
    }
    
    .date-section h2 {
      font-size: 20px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ddd;
    }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(var(--columns, 4), 1fr);
      gap: 15px;
    }
    
    .image-item {
      position: relative;
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    
    .image-item:hover {
      transform: scale(1.05);
    }
    
    .image-item img {
      display: block;
      width: 100%;
      height: 262px;
      object-fit: cover;
    }
    
    .buttons {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 5px;
      padding: 5px;
      background: rgba(0,0,0,0.5);
      justify-content: space-between;
    }
    
    .buttons button {
      flex: 1;
      padding: 5px;
      border: none;
      border-radius: 4px;
      background-color: rgba(255,255,255,0.9);
      cursor: pointer;
      font-size: 12px;
      transition: background-color 0.2s;
    }
    
    .buttons button:hover {
      background-color: white;
    }
    
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
  </style>
</head>
<body>
  <h1>Gartic Highlights Gallery</h1>
  
  <div class="controls">
    <label for="columns">Columns:</label>
    <input type="number" id="columns" min="1" max="10" value="4">
  </div>
  
  <div id="gallery">
    <p style="text-align: center;">Loading gallery...</p>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
