name = "gartic-highlights-gallery"
main = "src/index.ts"
compatibility_date = "2024-04-22"

# Wrangler will automatically compile TypeScript

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "gartic_highlights_gallery"
database_id = "61d79ffa-eebf-4b09-a1b3-bd405d02a315"